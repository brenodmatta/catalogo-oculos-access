<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --tan: #C4A882;
    --tan-dark: #8B7355;
    --gray-dark: #6b6b6b;
    --gray-mid: #888;
    --cream: #EDE8DC;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Geist Mono', monospace;
    background: var(--black);
    color: var(--white);
    overflow-x: hidden;
  }

  /* BLOCO 1 — banner via imagem direta */
  .bloco-access img { width: 100%; display: block; }

  /* ══════════════════════════════════════
     BLOCO 2 — [ACCESS] LUXURY IS NOT UNREACHABLE
  ══════════════════════════════════════ */
  .bloco-access {
    width: 100%;
    position: relative;
  }

  /*
  ┌─────────────────────────────────────────────────────────┐
  │  TROQUE AQUI: substitua BLOCO_ACESS_LUXURY_IS_NOT_...png│
  │  pelo nome da sua imagem final                          │
  └─────────────────────────────────────────────────────────┘
  */
  .bloco-access img {
    width: 100%;
    display: block;
  }

  /* ══════════════════════════════════════
     BLOCO 3 — FAIXA DAS MARCAS (ANIMADA)
  ══════════════════════════════════════ */
  .marcas-strip {
    background: var(--black);
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
    padding: 28px 0;
    overflow: hidden;
    position: relative;
  }

  .marcas-strip::before,
  .marcas-strip::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 120px;
    z-index: 2;
    pointer-events: none;
  }

  .marcas-strip::before {
    left: 0;
    background: linear-gradient(to right, var(--black), transparent);
  }

  .marcas-strip::after {
    right: 0;
    background: linear-gradient(to left, var(--black), transparent);
  }

  .marcas-track {
    display: flex;
    align-items: center;
    gap: 60px;
    width: max-content;
    animation: scrollMarcas 30s linear infinite;
  }

  .marcas-track:hover { animation-play-state: paused; }

  @keyframes scrollMarcas {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .marca-logo {
    height: 30px;
    width: auto;
    max-width: 110px;
    object-fit: contain;
    opacity: 0.55;
    filter: brightness(10);
    transition: opacity 0.3s, transform 0.3s;
    flex-shrink: 0;
  }

  /* Ajuste fino por formato de logo */
  .marca-logo.tall    { height: 28px; max-width: 60px;  } /* Balmain, Chanel, Gucci, Dior */
  .marca-logo.wide    { height: 16px; max-width: 150px; } /* D&G, Prada */
  .marca-logo.small   { height: 24px; max-width: 36px;  } /* Lacoste */
  .marca-logo.square  { height: 28px; max-width: 42px;  } /* LV, Versace */

  .marca-logo:hover {
    opacity: 1;
    transform: scale(1.08);
  }

  /* ══════════════════════════════════════
     BLOCO 4 — ICONS OF STYLE
  ══════════════════════════════════════ */
  .bloco-icons {
    width: 100%;
    position: relative;
  }

  /*
  ┌──────────────────────────────────────────┐
  │  TROQUE AQUI: substitua BLOCO_Icons_...  │
  │  pelo nome da sua imagem final           │
  └──────────────────────────────────────────┘
  */
  .bloco-icons img {
    width: 100%;
    display: block;
  }

  /* ══════════════════════════════════════
     BLOCO 5 — INSIDE THE [ACCESS] + CHANGES EVERYTHING
  ══════════════════════════════════════ */
  .bloco-inside {
    width: 100%;
    position: relative;
  }

  /*
  ┌──────────────────────────────────────────────────────────┐
  │  TROQUE AQUI: substitua BLOCO_INSIDE_THE_ACCESS_...png   │
  │  pelo nome da sua imagem final                           │
  └──────────────────────────────────────────────────────────┘
  */
  .bloco-inside img {
    width: 100%;
    display: block;
  }

  /* ══════════════════════════════════════
     BLOCO 6 — EXPLORE O CATÁLOGO
  ══════════════════════════════════════ */
  .bloco-catalogo {
    width: 100%;
    position: relative;
  }

  /*
  ┌──────────────────────────────────────────┐
  │  TROQUE AQUI: substitua BLOCO_DO_...png  │
  │  pelo nome da sua imagem final           │
  │  Os botões abaixo ficam sobrepostos      │
  └──────────────────────────────────────────┘
  */
  .bloco-catalogo-img {
    width: 100%;
    display: block;
  }

  /* Botões sobrepostos na imagem */
  .catalogo-btns {
    position: absolute;
    top: 28%;
    right: 4%;
    width: 46%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
  }

  .btn-catalogo {
    display: block;
    width: 100%;
    height: 28%;
    text-decoration: none;
  }

  /* Botões reais sobre a imagem */
  .btn-catalogo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #EDE8DC;
    color: #0a0a0a;
    font-family: 'Geist Mono', monospace;
    font-weight: 700;
    font-size: clamp(13px, 1.5vw, 18px);
    letter-spacing: 0.05em;
    text-decoration: none;
    padding: 16px 24px;
    border: 2px solid #0a0a0a;
    transition: all 0.2s ease;
    width: 100%;
  }

  .btn-catalogo:hover {
    background: #0a0a0a;
    color: #EDE8DC;
  }

  /* Link WhatsApp invisível sobreposto no rodapé da imagem */
  .whats-overlay {
    position: absolute;
    bottom: 8%;
    right: 12%;
    width: 30%;
    height: 12%;
    z-index: 10;
    cursor: pointer;
    text-decoration: none;
  }
  footer {
    background: var(--black);
    border-top: 1px solid #1a1a1a;
    padding: 32px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .footer-logo {
    font-family: 'Geist', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.15em;
    color: var(--white);
  }

  .footer-logo span {
    color: var(--tan);
  }

  .footer-copy {
    font-size: 11px;
    color: var(--gray-dark);
    letter-spacing: 0.1em;
  }

  .footer-whats {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--gray-mid);
    font-size: 13px;
    transition: color 0.2s;
  }

  .footer-whats:hover { color: #25D366; }

  .footer-whats svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  /* ══════════════════════════════════════
     FADE-IN AO SCROLLAR
  ══════════════════════════════════════ */


  /* ══════════════════════════════════════
     RESPONSIVO
  ══════════════════════════════════════ */
  @media (max-width: 768px) {
    .banner { height: 55vw; min-height: 280px; }

    .catalogo-btns {
      position: relative;
      top: auto; right: auto;
      transform: none;
      padding: 32px 24px;
      background: #111;
    }

    .btn-catalogo { min-width: unset; width: 100%; font-size: 14px; padding: 14px 20px; }

    footer {
      padding: 24px;
      flex-direction: column;
      text-align: center;
    }
  }
</style>
